<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Wealth Dashboard</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- Premium Font: Montserrat -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Montserrat', sans-serif; background-color: #09090b; color: #f4f4f5; }
        .glass-card { background: #18181b; border: 1px solid #27272a; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.7); }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #09090b; }
        ::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #ca8a04; }
        
        .modal-enter { animation: fadeIn 0.3s ease-out forwards; }
        .modal-exit { animation: fadeOut 0.2s ease-in forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        @keyframes fadeOut { from { opacity: 1; transform: scale(1); } to { opacity: 0; transform: scale(0.95); } }
        
        .live-dot { animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 1; box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.7); } 70% { opacity: 0.5; box-shadow: 0 0 0 6px rgba(34, 197, 94, 0); } 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(34, 197, 94, 0); } }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8">

    <header class="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-4">
        <div>
            <div class="flex items-center gap-3">
                <h1 class="text-3xl md:text-4xl font-bold tracking-tight text-transparent bg-clip-text bg-gradient-to-r from-yellow-600 to-yellow-300">Wealth Portfolio</h1>
                <span class="flex items-center gap-1.5 px-2.5 py-1 bg-green-900/30 border border-green-800 rounded-full text-[10px] font-bold text-green-400 uppercase tracking-wider">
                    <span class="w-1.5 h-1.5 bg-green-500 rounded-full live-dot"></span>Live API
                </span>
            </div>
            <p class="text-sm text-zinc-400 mt-1" id="current-date"></p>
        </div>
        <div class="flex items-center gap-3 flex-wrap">
            <!-- Currency Toggle -->
            <div class="bg-zinc-950 p-1 rounded-md border border-zinc-800 flex items-center">
                <button onclick="setCurrency('USD')" id="btn-usd" class="px-3 py-1 rounded text-xs font-bold bg-zinc-800 text-yellow-500 transition shadow">USD</button>
                <button onclick="setCurrency('JPY')" id="btn-jpy" class="px-3 py-1 rounded text-xs font-bold text-zinc-500 hover:text-zinc-300 transition">JPY</button>
            </div>
            
            <div class="h-6 w-px bg-zinc-700 mx-1"></div>
            
            <button onclick="refreshLivePrices()" class="px-4 py-1.5 rounded-md text-sm font-semibold glass-card hover:bg-zinc-800 transition text-zinc-300 flex items-center gap-2">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                Sync
            </button>
            <button onclick="openModal()" class="px-5 py-1.5 rounded-md text-sm font-bold bg-gradient-to-r from-yellow-700 to-yellow-600 hover:from-yellow-600 hover:to-yellow-500 text-zinc-950 transition shadow-lg flex items-center gap-2">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                Update Holdings
            </button>
        </div>
    </header>

    <!-- Top Summary Cards -->
    <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-8">
        <div class="glass-card rounded-xl p-6 relative overflow-hidden">
            <h3 class="text-zinc-400 text-sm font-medium mb-2">Total Net Worth</h3>
            <div class="text-3xl font-bold mb-1 text-white transition-all duration-300" id="val-total">$0.00</div>
            <div id="status-msg" class="text-xs font-medium mt-2 text-yellow-500">Fetching live market data...</div>
        </div>
        <div class="glass-card rounded-xl p-6 border-t-2 border-zinc-400">
            <h3 class="text-zinc-400 text-sm font-medium mb-2">Bank / Cash</h3>
            <div class="text-2xl font-bold mb-1 text-white transition-all duration-300" id="val-bank">$0</div>
            <div class="text-zinc-500 text-sm font-medium" id="pct-bank">0%</div>
        </div>
        <div class="glass-card rounded-xl p-6 border-t-2 border-yellow-600">
            <h3 class="text-zinc-400 text-sm font-medium mb-2">Live Equities Value</h3>
            <div class="text-2xl font-bold mb-1 text-white transition-all duration-300" id="val-stocks">$0</div>
            <div class="text-zinc-500 text-sm font-medium" id="pct-stocks">0%</div>
        </div>
        <div class="glass-card rounded-xl p-6 border-t-2 border-orange-500">
            <h3 class="text-zinc-400 text-sm font-medium mb-2">Live Crypto Value</h3>
            <div class="text-2xl font-bold mb-1 text-white transition-all duration-300" id="val-crypto">$0</div>
            <div class="text-zinc-500 text-sm font-medium" id="pct-crypto">0%</div>
        </div>
    </div>

    <!-- Charts & Holdings -->
    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 mb-12">
        <div class="glass-card rounded-xl p-6 flex flex-col justify-center">
            <h3 class="text-lg font-semibold mb-4 text-zinc-200">Asset Allocation</h3>
            <div class="relative h-64 w-full"><canvas id="allocationChart"></canvas></div>
        </div>
        
        <div class="glass-card rounded-xl p-6 lg:col-span-2 overflow-x-auto">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-lg font-semibold text-zinc-200">Real-Time Holdings</h3>
                <span id="forex-rate" class="text-xs text-zinc-500 font-medium"></span>
            </div>
            <table class="w-full text-left border-collapse">
                <thead>
                    <tr class="text-zinc-400 text-xs uppercase tracking-wider border-b border-zinc-800">
                        <th class="pb-3 font-medium">Ticker</th>
                        <th class="pb-3 font-medium">Type</th>
                        <th class="pb-3 font-medium text-right">Units Held</th>
                        <th class="pb-3 font-medium text-right">Live Price</th>
                        <th class="pb-3 font-medium text-right">Current Value</th>
                    </tr>
                </thead>
                <tbody id="holdings-table-body" class="text-sm"></tbody>
            </table>
        </div>
    </div>

    <!-- ================= MODAL FOR DATA ENTRY ================= -->
    <div id="update-modal" class="hidden fixed inset-0 bg-black/80 backdrop-blur-sm z-50 flex justify-center items-center p-4">
        <div class="glass-card w-full max-w-xl max-h-[90vh] rounded-xl flex flex-col shadow-2xl border border-zinc-700">
            <div class="p-5 border-b border-zinc-800 flex justify-between items-center bg-zinc-900/50 rounded-t-xl">
                <h3 class="text-xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-yellow-500 to-yellow-200">Update Asset Quantities</h3>
                <button onclick="closeModal()" class="text-zinc-400 hover:text-white transition"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg></button>
            </div>
            
            <div class="p-6 overflow-y-auto custom-scrollbar">
                <form id="daily-form">
                    <div class="mb-6 pb-6 border-b border-zinc-800">
                        <label class="block text-sm font-medium text-zinc-400 mb-3">Bank / Cash Balance (Base USD)</label>
                        <input type="number" id="input-bank" required class="w-full bg-zinc-950 border border-zinc-700 text-white p-3 rounded-lg focus:outline-none focus:border-yellow-600 transition" placeholder="e.g. 150000">
                    </div>
                    <div class="mb-6 pb-6 border-b border-zinc-800">
                        <div class="flex justify-between items-center mb-3">
                            <label class="block text-sm font-medium text-zinc-400">Stock Units</label>
                            <button type="button" onclick="addAssetRow('stock')" class="text-xs font-semibold text-yellow-500 hover:text-yellow-400 border border-yellow-600/30 px-2 py-1 rounded transition">+ Add Stock</button>
                        </div>
                        <div id="stock-container" class="space-y-3"></div>
                    </div>
                    <div class="mb-2">
                        <div class="flex justify-between items-center mb-3">
                            <label class="block text-sm font-medium text-zinc-400">Crypto Units</label>
                            <button type="button" onclick="addAssetRow('crypto')" class="text-xs font-semibold text-orange-500 hover:text-orange-400 border border-orange-600/30 px-2 py-1 rounded transition">+ Add Crypto</button>
                        </div>
                        <div id="crypto-container" class="space-y-3"></div>
                    </div>
                </form>
            </div>

            <div class="p-5 border-t border-zinc-800 bg-zinc-900/80 rounded-b-xl flex gap-3 justify-end">
                <button onclick="closeModal()" class="px-5 py-2.5 rounded text-sm font-semibold text-zinc-400 hover:text-white transition">Cancel</button>
                <button type="submit" form="daily-form" class="px-6 py-2.5 bg-gradient-to-r from-yellow-700 to-yellow-600 hover:from-yellow-600 hover:to-yellow-500 text-zinc-950 font-bold rounded shadow-lg transition">Save Units</button>
            </div>
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="fixed bottom-6 right-6 transform translate-y-[150%] opacity-0 transition-all duration-500 z-50 flex items-center gap-3 glass-card border-l-4 border-l-yellow-500 text-white px-5 py-4 rounded shadow-2xl">
        <svg class="w-6 h-6 text-yellow-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
        <span id="toast-msg" class="font-medium text-sm">Updated!</span>
    </div>

    <script>
        // ================= CONFIGURATION =================
        // ใส่ API Key ของ Finnhub ตรงนี้ (เพื่อดึงราคาหุ้นจริง)
        const FINNHUB_API_KEY = ''; 
        // =================================================

        document.getElementById('current-date').innerText = new Date().toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
        let donutChartInstance = null;
        Chart.defaults.color = '#a1a1aa'; Chart.defaults.font.family = 'Montserrat';

        // State Variables
        let currentCurrency = 'USD';
        let jpyRate = 150.0; // Fallback rate
        let cachedData = { totalNet: 0, bank: 0, stocksTotal: 0, cryptoTotal: 0, holdings: [] };

        let portfolio = JSON.parse(localStorage.getItem('wealthPortfolioUnits')) || {
            bank: 45000,
            stocks: [{ ticker: 'MSFT', units: 120 }, { ticker: 'LLY', units: 45 }, { ticker: 'ASTS', units: 850 }],
            crypto: [{ ticker: 'BTC', units: 1.5 }, { ticker: 'ETH', units: 12 }]
        };

        const fallbackPrices = { 'MSFT': 415.50, 'LLY': 760.20, 'ASTS': 28.50, 'BTC': 64000, 'ETH': 3100 };

        // 1. Fetch JPY Exchange Rate
        async function fetchExchangeRate() {
            try {
                let res = await fetch('https://open.er-api.com/v6/latest/USD');
                let data = await res.json();
                jpyRate = data.rates.JPY;
                document.getElementById('forex-rate').innerText = `1 USD = ¥${jpyRate.toFixed(2)}`;
            } catch(e) { console.log("Exchange API error, using fallback."); }
        }

        // 2. Fetch Asset Prices
        async function fetchPrice(type, ticker) {
            ticker = ticker.toUpperCase();
            if (type === 'crypto') {
                try {
                    let res = await fetch(`https://api.binance.com/api/v3/ticker/price?symbol=${ticker}USDT`);
                    let data = await res.json(); return parseFloat(data.price);
                } catch(e) { return fallbackPrices[ticker] || 0; }
            } else {
                if (!FINNHUB_API_KEY) return fallbackPrices[ticker] || 0;
                try {
                    let res = await fetch(`https://finnhub.io/api/v1/quote?symbol=${ticker}&token=${FINNHUB_API_KEY}`);
                    let data = await res.json(); return data.c > 0 ? data.c : (fallbackPrices[ticker] || 0);
                } catch(e) { return fallbackPrices[ticker] || 0; }
            }
        }

        // 3. Process Data
        async function processLiveDashboard() {
            document.getElementById('status-msg').innerText = "Fetching live market data...";
            document.getElementById('status-msg').className = "text-xs font-medium mt-2 text-yellow-500 animate-pulse";
            
            await fetchExchangeRate();
            
            let totalStocksValue = 0; let totalCryptoValue = 0;
            const liveHoldings = [];

            for (let s of portfolio.stocks) {
                let price = await fetchPrice('stock', s.ticker);
                let val = s.units * price;
                totalStocksValue += val;
                liveHoldings.push({ ticker: s.ticker, type: 'Stock', units: s.units, priceUsd: price, valueUsd: val, color: 'text-yellow-500' });
            }

            for (let c of portfolio.crypto) {
                let price = await fetchPrice('crypto', c.ticker);
                let val = c.units * price;
                totalCryptoValue += val;
                liveHoldings.push({ ticker: c.ticker, type: 'Crypto', units: c.units, priceUsd: price, valueUsd: val, color: 'text-orange-500' });
            }

            // Cache data in USD
            cachedData = {
                totalNet: portfolio.bank + totalStocksValue + totalCryptoValue,
                bank: portfolio.bank,
                stocksTotal: totalStocksValue,
                cryptoTotal: totalCryptoValue,
                holdings: liveHoldings
            };

            document.getElementById('status-msg').innerText = FINNHUB_API_KEY ? "Live sync complete" : "Mock Stock Prices (Add API Key for Live)";
            document.getElementById('status-msg').className = "text-xs font-medium mt-2 text-zinc-500";

            renderUI();
        }

        // 4. Render UI & Currency Formatting
        function formatMoney(usdValue, isPrice = false) {
            if (currentCurrency === 'JPY') {
                let jpyValue = usdValue * jpyRate;
                // ราคาหุ้นรายตัวอาจจะมีทศนิยม แต่พอร์ตรวมเยนมักจะไม่มี
                return '¥' + jpyValue.toLocaleString('ja-JP', { maximumFractionDigits: isPrice ? 2 : 0 });
            } else {
                return '$' + usdValue.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
            }
        }

        function setCurrency(currency) {
            currentCurrency = currency;
            
            // Toggle Button Styles
            if(currency === 'USD') {
                document.getElementById('btn-usd').className = "px-3 py-1 rounded text-xs font-bold bg-zinc-800 text-yellow-500 transition shadow";
                document.getElementById('btn-jpy').className = "px-3 py-1 rounded text-xs font-bold text-zinc-500 hover:text-zinc-300 transition";
            } else {
                document.getElementById('btn-jpy').className = "px-3 py-1 rounded text-xs font-bold bg-zinc-800 text-yellow-500 transition shadow";
                document.getElementById('btn-usd').className = "px-3 py-1 rounded text-xs font-bold text-zinc-500 hover:text-zinc-300 transition";
            }
            renderUI(); // Re-render instantly from cache
        }

        function renderUI() {
            document.getElementById('val-total').innerText = formatMoney(cachedData.totalNet);
            document.getElementById('val-bank').innerText = formatMoney(cachedData.bank);
            document.getElementById('val-stocks').innerText = formatMoney(cachedData.stocksTotal);
            document.getElementById('val-crypto').innerText = formatMoney(cachedData.cryptoTotal);

            if(cachedData.totalNet > 0) {
                document.getElementById('pct-bank').innerText = ((cachedData.bank / cachedData.totalNet) * 100).toFixed(1) + '%';
                document.getElementById('pct-stocks').innerText = ((cachedData.stocksTotal / cachedData.totalNet) * 100).toFixed(1) + '%';
                document.getElementById('pct-crypto').innerText = ((cachedData.cryptoTotal / cachedData.totalNet) * 100).toFixed(1) + '%';
            }

            const tbody = document.getElementById('holdings-table-body');
            tbody.innerHTML = '';
            cachedData.holdings.sort((a, b) => b.valueUsd - a.valueUsd).forEach(asset => {
                tbody.innerHTML += `<tr class="border-b border-zinc-800/50 hover:bg-zinc-800/30 transition">
                    <td class="py-3 font-bold text-zinc-200">${asset.ticker}</td>
                    <td class="py-3 ${asset.color} font-medium text-[10px] tracking-wider uppercase"><span class="bg-zinc-900 px-2 py-1 rounded border border-zinc-800">${asset.type}</span></td>
                    <td class="py-3 text-right text-zinc-400 text-sm">${asset.units.toLocaleString()}</td>
                    <td class="py-3 text-right text-zinc-300 font-medium">${formatMoney(asset.priceUsd, true)}</td>
                    <td class="py-3 text-right text-emerald-400 font-bold">${formatMoney(asset.valueUsd)}</td>
                </tr>`;
            });

            // Chart
            const ctx = document.getElementById('allocationChart').getContext('2d');
            if (donutChartInstance) donutChartInstance.destroy();
            donutChartInstance = new Chart(ctx, {
                type: 'doughnut',
                data: { labels: ['Bank', 'Stocks', 'Crypto'], datasets: [{ data: [cachedData.bank, cachedData.stocksTotal, cachedData.cryptoTotal], backgroundColor: ['#a1a1aa', '#ca8a04', '#f97316'], borderWidth: 0 }] },
                options: { responsive: true, maintainAspectRatio: false, cutout: '75%', plugins: { legend: { position: 'bottom' } }, animation: false }
            });
        }

        function refreshLivePrices() {
            showToast("Syncing latest market prices...");
            processLiveDashboard();
        }

        // --- Modal Logic ---
        const modal = document.getElementById('update-modal');
        function openModal() {
            document.getElementById('input-bank').value = portfolio.bank;
            document.getElementById('stock-container').innerHTML = '';
            portfolio.stocks.forEach(s => addAssetRow('stock', s.ticker, s.units));
            if(portfolio.stocks.length === 0) addAssetRow('stock');
            document.getElementById('crypto-container').innerHTML = '';
            portfolio.crypto.forEach(c => addAssetRow('crypto', c.ticker, c.units));
            if(portfolio.crypto.length === 0) addAssetRow('crypto');
            modal.classList.remove('hidden'); modal.querySelector('.glass-card').classList.add('modal-enter');
        }
        function closeModal() { modal.classList.add('hidden'); }
        function showToast(msg) {
            document.getElementById('toast-msg').innerText = msg;
            const t = document.getElementById('toast');
            t.classList.remove('translate-y-[150%]', 'opacity-0');
            setTimeout(() => t.classList.add('translate-y-[150%]', 'opacity-0'), 3000);
        }

        function addAssetRow(type, ticker = '', units = '') {
            const container = document.getElementById(`${type}-container`);
            const row = document.createElement('div');
            row.className = `flex gap-2 items-center ${type}-row`;
            row.innerHTML = `<input type="text" placeholder="Ticker (e.g. AAPL)" value="${ticker}" required class="asset-ticker w-1/2 bg-zinc-950 border border-zinc-800 text-white p-2.5 rounded-lg text-sm uppercase focus:outline-none focus:border-zinc-500">
                <input type="number" step="any" placeholder="Units Held" value="${units}" required class="asset-units w-1/2 bg-zinc-950 border border-zinc-800 text-white p-2.5 rounded-lg text-sm focus:outline-none focus:border-zinc-500">
                <button type="button" onclick="this.parentElement.remove()" class="text-zinc-600 hover:text-red-500 px-2 transition"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg></button>`;
            container.appendChild(row);
        }

        document.getElementById('daily-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const bank = parseFloat(document.getElementById('input-bank').value) || 0;
            const stocks = []; document.querySelectorAll('.stock-row').forEach(row => { const t = row.querySelector('.asset-ticker').value.toUpperCase(); const u = parseFloat(row.querySelector('.asset-units').value) || 0; if(t) stocks.push({ticker: t, units: u}); });
            const crypto = []; document.querySelectorAll('.crypto-row').forEach(row => { const t = row.querySelector('.asset-ticker').value.toUpperCase(); const u = parseFloat(row.querySelector('.asset-units').value) || 0; if(t) crypto.push({ticker: t, units: u}); });
            portfolio = { bank, stocks, crypto };
            localStorage.setItem('wealthPortfolioUnits', JSON.stringify(portfolio));
            closeModal(); showToast("Portfolio quantities updated!"); processLiveDashboard();
        });

        // Start App
        processLiveDashboard();
    </script>
</body>
</html>
