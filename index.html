<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Executive Wealth Dashboard</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- Premium Font: Montserrat -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Montserrat', sans-serif;
            background-color: #09090b; /* Zinc 950 - โทนดำสนิท ไม่มีอมน้ำเงิน */
            color: #f4f4f5;
        }
        .glass-card {
            background: #18181b; /* Zinc 900 */
            border: 1px solid #27272a; /* Zinc 800 */
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.7);
        }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8">

    <!-- Header & Language Switcher -->
    <header class="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-4">
        <div>
            <h1 class="text-3xl md:text-4xl font-bold tracking-tight text-transparent bg-clip-text bg-gradient-to-r from-yellow-600 to-yellow-300" data-i18n="title">Wealth Portfolio</h1>
            <p class="text-sm text-zinc-400 mt-1" id="current-date"></p>
        </div>
        <div class="flex gap-2">
            <button onclick="setLanguage('en')" class="px-4 py-1.5 rounded-md text-sm font-semibold glass-card hover:bg-zinc-800 transition text-zinc-300">EN</button>
            <button onclick="setLanguage('jp')" class="px-4 py-1.5 rounded-md text-sm font-semibold glass-card hover:bg-zinc-800 transition text-zinc-300">日本語</button>
        </div>
    </header>

    <!-- Daily Data Input Section -->
    <div class="glass-card rounded-xl p-6 mb-8 border-l-4 border-l-yellow-600">
        <h3 class="text-lg font-semibold mb-4 text-zinc-200" data-i18n="add_daily">Update Daily Record</h3>
        <form id="daily-form" class="grid grid-cols-1 md:grid-cols-5 gap-4 items-end">
            <div>
                <label class="block text-xs text-zinc-400 mb-1" data-i18n="date_label">Date</label>
                <input type="date" id="input-date" required class="w-full bg-zinc-950 border border-zinc-700 text-white p-2.5 rounded focus:outline-none focus:border-yellow-500">
            </div>
            <div>
                <label class="block text-xs text-zinc-400 mb-1" data-i18n="bank_label">Bank Balance</label>
                <input type="number" id="input-bank" required class="w-full bg-zinc-950 border border-zinc-700 text-white p-2.5 rounded focus:outline-none focus:border-yellow-500">
            </div>
            <div>
                <label class="block text-xs text-zinc-400 mb-1" data-i18n="stocks_label">Stocks Balance</label>
                <input type="number" id="input-stocks" required class="w-full bg-zinc-950 border border-zinc-700 text-white p-2.5 rounded focus:outline-none focus:border-yellow-500">
            </div>
            <div>
                <label class="block text-xs text-zinc-400 mb-1" data-i18n="crypto_label">Crypto Balance</label>
                <input type="number" id="input-crypto" required class="w-full bg-zinc-950 border border-zinc-700 text-white p-2.5 rounded focus:outline-none focus:border-yellow-500">
            </div>
            <div>
                <button type="submit" class="w-full px-4 py-2.5 bg-gradient-to-r from-yellow-700 to-yellow-600 hover:from-yellow-600 hover:to-yellow-500 text-zinc-950 font-bold rounded transition shadow-lg" data-i18n="save_btn">Save Record</button>
            </div>
        </form>
    </div>

    <!-- Top Summary Cards -->
    <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-8">
        <!-- Total -->
        <div class="glass-card rounded-xl p-6">
            <h3 class="text-zinc-400 text-sm font-medium mb-2" data-i18n="total_net">Total Net Worth</h3>
            <div class="text-3xl font-bold mb-1 text-white" id="val-total">$0</div>
            <div id="change-total" class="text-sm font-medium mt-2">--</div>
        </div>
        <!-- Bank -->
        <div class="glass-card rounded-xl p-6 border-t-2 border-zinc-400">
            <h3 class="text-zinc-400 text-sm font-medium mb-2" data-i18n="bank">Bank / Cash</h3>
            <div class="text-2xl font-bold mb-1 text-white" id="val-bank">$0</div>
            <div class="text-zinc-500 text-sm font-medium" id="pct-bank">0%</div>
        </div>
        <!-- Stocks -->
        <div class="glass-card rounded-xl p-6 border-t-2 border-yellow-600">
            <h3 class="text-zinc-400 text-sm font-medium mb-2" data-i18n="stocks">Stock Balance</h3>
            <div class="text-2xl font-bold mb-1 text-white" id="val-stocks">$0</div>
            <div class="text-zinc-500 text-sm font-medium" id="pct-stocks">0%</div>
        </div>
        <!-- Crypto -->
        <div class="glass-card rounded-xl p-6 border-t-2 border-orange-500">
            <h3 class="text-zinc-400 text-sm font-medium mb-2" data-i18n="crypto">Crypto</h3>
            <div class="text-2xl font-bold mb-1 text-white" id="val-crypto">$0</div>
            <div class="text-zinc-500 text-sm font-medium" id="pct-crypto">0%</div>
        </div>
    </div>

    <!-- Charts Section -->
    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 mb-8">
        <!-- Allocation Donut Chart -->
        <div class="glass-card rounded-xl p-6 lg:col-span-1 flex flex-col justify-center">
            <h3 class="text-lg font-semibold mb-4 text-zinc-200" data-i18n="allocation">Asset Allocation</h3>
            <div class="relative h-64 w-full">
                <canvas id="allocationChart"></canvas>
            </div>
        </div>
        
        <!-- Net Worth Trend Line Chart -->
        <div class="glass-card rounded-xl p-6 lg:col-span-2">
            <h3 class="text-lg font-semibold mb-4 text-zinc-200" data-i18n="trend">Wealth Trend</h3>
            <div class="relative h-64 w-full">
                <canvas id="trendChart"></canvas>
            </div>
        </div>
    </div>

    <script>
        // --- 1. Initial Setup & Data Management ---
        // ตั้งค่าวันที่ปัจจุบันให้ Form
        document.getElementById('input-date').valueAsDate = new Date();
        document.getElementById('current-date').innerText = new Date().toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });

        // โหลดข้อมูลจาก LocalStorage ถ้าไม่มีให้ใช้ข้อมูลตัวอย่าง
        let historyData = JSON.parse(localStorage.getItem('wealthHistory')) || [
            { date: '2024-04-01', bank: 100000, stocks: 500000, crypto: 200000 },
            { date: '2024-04-15', bank: 120000, stocks: 520000, crypto: 190000 }
        ];

        let donutChartInstance = null;
        let lineChartInstance = null;
        Chart.defaults.color = '#a1a1aa'; // Zinc 400
        Chart.defaults.font.family = 'Montserrat';

        // --- 2. Update UI Functions ---
        function formatMoney(num) {
            return '$' + num.toLocaleString('en-US');
        }

        function updateDashboard() {
            if (historyData.length === 0) return;

            // เรียงข้อมูลตามวันที่
            historyData.sort((a, b) => new Date(a.date) - new Date(b.date));
            const latest = historyData[historyData.length - 1];
            const previous = historyData.length > 1 ? historyData[historyData.length - 2] : latest;

            const totalLatest = latest.bank + latest.stocks + latest.crypto;
            const totalPrevious = previous.bank + previous.stocks + previous.crypto;
            const diff = totalLatest - totalPrevious;
            const diffPct = totalPrevious > 0 ? (diff / totalPrevious) * 100 : 0;

            // อัปเดตตัวเลขในการ์ด
            document.getElementById('val-total').innerText = formatMoney(totalLatest);
            document.getElementById('val-bank').innerText = formatMoney(latest.bank);
            document.getElementById('val-stocks').innerText = formatMoney(latest.stocks);
            document.getElementById('val-crypto').innerText = formatMoney(latest.crypto);

            // อัปเดตเปอร์เซ็นต์สัดส่วน
            document.getElementById('pct-bank').innerText = ((latest.bank / totalLatest) * 100).toFixed(1) + '%';
            document.getElementById('pct-stocks').innerText = ((latest.stocks / totalLatest) * 100).toFixed(1) + '%';
            document.getElementById('pct-crypto').innerText = ((latest.crypto / totalLatest) * 100).toFixed(1) + '%';

            // อัปเดตตัวเลขกำไร/ขาดทุน
            const changeEl = document.getElementById('change-total');
            if (diff > 0) {
                changeEl.innerHTML = `<span class="text-emerald-500">▲ +${formatMoney(diff)} (+${diffPct.toFixed(2)}%)</span>`;
            } else if (diff < 0) {
                changeEl.innerHTML = `<span class="text-red-500">▼ ${formatMoney(diff)} (${diffPct.toFixed(2)}%)</span>`;
            } else {
                changeEl.innerHTML = `<span class="text-zinc-500">No change</span>`;
            }

            updateCharts(latest);
        }

        // --- 3. Charts Logic ---
        function updateCharts(latestData) {
            const donutCtx = document.getElementById('allocationChart').getContext('2d');
            const lineCtx = document.getElementById('trendChart').getContext('2d');

            // Data for Donut
            const donutData = [latestData.bank, latestData.stocks, latestData.crypto];
            
            if (donutChartInstance) donutChartInstance.destroy();
            donutChartInstance = new Chart(donutCtx, {
                type: 'doughnut',
                data: {
                    labels: ['Bank', 'Stocks', 'Crypto'],
                    datasets: [{
                        data: donutData,
                        backgroundColor: ['#a1a1aa', '#ca8a04', '#f97316'], // Zinc, Yellow, Orange (No Blue)
                        borderWidth: 0,
                    }]
                },
                options: {
                    responsive: true, maintainAspectRatio: false, cutout: '75%',
                    plugins: { legend: { position: 'bottom' } }
                }
            });

            // Data for Line Chart
            const dates = historyData.map(d => d.date);
            const totals = historyData.map(d => d.bank + d.stocks + d.crypto);

            let gradient = lineCtx.createLinearGradient(0, 0, 0, 400);
            gradient.addColorStop(0, 'rgba(202, 138, 4, 0.4)'); // Yellow gradient
            gradient.addColorStop(1, 'rgba(202, 138, 4, 0.0)');

            if (lineChartInstance) lineChartInstance.destroy();
            lineChartInstance = new Chart(lineCtx, {
                type: 'line',
                data: {
                    labels: dates,
                    datasets: [{
                        label: 'Net Worth',
                        data: totals,
                        borderColor: '#ca8a04', // Yellow 600
                        backgroundColor: gradient,
                        borderWidth: 2, fill: true, tension: 0.3, pointRadius: 3
                    }]
                },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        x: { grid: { display: false } },
                        y: { 
                            grid: { color: '#27272a' },
                            ticks: { callback: function(value) { return '$' + value / 1000 + 'k'; } }
                        }
                    }
                }
            });
        }

        // --- 4. Handle Form Submission ---
        document.getElementById('daily-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const date = document.getElementById('input-date').value;
            const bank = parseFloat(document.getElementById('input-bank').value) || 0;
            const stocks = parseFloat(document.getElementById('input-stocks').value) || 0;
            const crypto = parseFloat(document.getElementById('input-crypto').value) || 0;

            // ตรวจสอบว่ามีข้อมูลของวันนี้หรือยัง ถ้ามีให้อัปเดต ถ้าไม่มีให้เพิ่มใหม่
            const existingIndex = historyData.findIndex(d => d.date === date);
            if (existingIndex >= 0) {
                historyData[existingIndex] = { date, bank, stocks, crypto };
            } else {
                historyData.push({ date, bank, stocks, crypto });
            }

            // บันทึกลง Browser
            localStorage.setItem('wealthHistory', JSON.stringify(historyData));
            updateDashboard();
            alert('Record saved successfully!');
        });

        // --- 5. I18N (Language System) ---
        const dictionary = {
            en: {
                title: "Wealth Portfolio", add_daily: "Update Daily Record",
                date_label: "Date", bank_label: "Bank Balance", stocks_label: "Stocks Balance", crypto_label: "Crypto Balance", save_btn: "Save Record",
                total_net: "Total Net Worth", bank: "Bank / Cash", stocks: "Stock Balance", crypto: "Crypto",
                allocation: "Asset Allocation", trend: "Wealth Trend"
            },
            jp: {
                title: "資産ポートフォリオ", add_daily: "日次記録の更新",
                date_label: "日付", bank_label: "銀行残高", stocks_label: "株式残高", crypto_label: "暗号資産残高", save_btn: "記録を保存",
                total_net: "純資産総額", bank: "銀行 / 現金", stocks: "株式残高", crypto: "暗号資産",
                allocation: "資産配分", trend: "資産推移"
            }
        };

        function setLanguage(lang) {
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (dictionary[lang][key]) el.innerText = dictionary[lang][key];
            });
        }

        // Initialize dashboard on load
        updateDashboard();
    </script>
</body>
</html>
