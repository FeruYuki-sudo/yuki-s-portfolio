<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fintech Wealth Dashboard</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- Premium Font: Montserrat -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Montserrat', sans-serif; background-color: #000000; color: #f4f4f5; }
        /* Modern Glass UI */
        .glass-card { 
            background: rgba(24, 24, 27, 0.6); 
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.05); 
            box-shadow: 0 10px 40px -10px rgba(0,0,0,0.5);
        }
        .gradient-text { background: linear-gradient(to right, #fbbf24, #fef08a); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 4px; }
        
        /* Modal Animation */
        .modal-enter { animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        .modal-exit { animation: slideDown 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px) scale(0.98); } to { opacity: 1; transform: translateY(0) scale(1); } }
        @keyframes slideDown { from { opacity: 1; transform: translateY(0) scale(1); } to { opacity: 0; transform: translateY(20px) scale(0.98); } }
        
        .live-dot { animation: pulse 2s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7); } 70% { box-shadow: 0 0 0 6px rgba(16, 185, 129, 0); } 100% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); } }

        /* Profit / Loss Colors */
        .text-profit { color: #10b981; } /* Emerald 500 */
        .bg-profit { background-color: rgba(16, 185, 129, 0.15); border: 1px solid rgba(16, 185, 129, 0.3); }
        .text-loss { color: #f43f5e; } /* Rose 500 */
        .bg-loss { background-color: rgba(244, 63, 94, 0.15); border: 1px solid rgba(244, 63, 94, 0.3); }
    </style>
</head>
<body class="min-h-screen p-4 md:p-6 lg:p-8 bg-[radial-gradient(ellipse_at_top_right,_var(--tw-gradient-stops))] from-zinc-900 via-black to-black">

    <!-- ================= HEADER & NAV ================= -->
    <header class="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-5">
        <div>
            <div class="flex items-center gap-3 mb-1">
                <h1 class="text-3xl md:text-4xl font-extrabold tracking-tight gradient-text" data-i18n="title">Wealth Portfolio</h1>
                <span class="flex items-center gap-1.5 px-2.5 py-1 bg-zinc-900 border border-zinc-800 rounded-full text-[10px] font-bold text-emerald-500 uppercase tracking-wider shadow-lg">
                    <span class="w-1.5 h-1.5 bg-emerald-500 rounded-full live-dot"></span>Live Market
                </span>
            </div>
            <p class="text-sm text-zinc-500 font-medium" id="current-date"></p>
        </div>
        
        <div class="flex items-center gap-2 flex-wrap">
            <!-- Toggles (Currency & Lang) -->
            <div class="glass-card p-1 rounded-lg flex items-center shadow-lg">
                <button onclick="setCurrency('USD')" id="btn-usd" class="px-3 py-1.5 rounded-md text-xs font-bold bg-zinc-800 text-yellow-500 transition">USD</button>
                <button onclick="setCurrency('JPY')" id="btn-jpy" class="px-3 py-1.5 rounded-md text-xs font-bold text-zinc-500 hover:text-zinc-300 transition">JPY</button>
                <div class="w-px h-4 bg-zinc-700 mx-1"></div>
                <button onclick="setLanguage('en')" id="btn-en" class="px-3 py-1.5 rounded-md text-xs font-bold bg-zinc-800 text-white transition">EN</button>
                <button onclick="setLanguage('jp')" id="btn-jp" class="px-3 py-1.5 rounded-md text-xs font-bold text-zinc-500 hover:text-zinc-300 transition">JP</button>
            </div>
            
            <!-- Actions -->
            <button onclick="refreshLivePrices()" class="glass-card px-4 py-2 rounded-lg text-sm font-semibold hover:bg-zinc-800 transition text-zinc-300 flex items-center gap-2">
                <svg class="w-4 h-4 text-emerald-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
            </button>
            <button onclick="openModal()" class="px-5 py-2 rounded-lg text-sm font-bold bg-white text-black hover:bg-zinc-200 transition shadow-[0_0_20px_rgba(255,255,255,0.2)] flex items-center gap-2">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                <span data-i18n="update_btn">Manage Assets</span>
            </button>
        </div>
    </header>

    <!-- ================= MAIN DASHBOARD (DIME STYLE) ================= -->
    <div class="grid grid-cols-1 lg:grid-cols-4 gap-6 mb-8">
        
        <!-- Total Net Worth Card (Hero) -->
        <div class="glass-card rounded-2xl p-8 lg:col-span-2 relative overflow-hidden flex flex-col justify-between border-t-2 border-t-yellow-500/50">
            <div class="absolute -right-10 -top-10 w-40 h-40 bg-yellow-500/10 rounded-full blur-3xl pointer-events-none"></div>
            <div>
                <h3 class="text-zinc-400 text-sm font-medium tracking-wide uppercase mb-2" data-i18n="total_net">Total Net Worth</h3>
                <div class="text-4xl md:text-5xl font-bold mb-3 text-white tracking-tight" id="val-total">$0.00</div>
                
                <!-- Total Return Badge -->
                <div class="flex items-center gap-3 mt-4">
                    <span class="text-sm text-zinc-500" data-i18n="total_return">Total Return</span>
                    <div id="total-return-badge" class="px-3 py-1.5 rounded-lg text-sm font-bold bg-profit text-profit flex items-center gap-1">
                        <span id="val-return-amt">+$0.00</span> 
                        <span class="opacity-50">|</span> 
                        <span id="val-return-pct">+0.00%</span>
                    </div>
                </div>
            </div>
            <div id="status-msg" class="text-xs font-medium mt-6 text-zinc-500" data-i18n="fetching">Connecting to market...</div>
        </div>

        <!-- Breakdown Cards -->
        <div class="grid grid-rows-2 gap-6 lg:col-span-1">
            <div class="glass-card rounded-2xl p-6 flex flex-col justify-center">
                <h3 class="text-zinc-400 text-xs font-medium uppercase tracking-wider mb-1" data-i18n="stocks_val">Equities Value</h3>
                <div class="text-2xl font-bold text-white mb-2" id="val-stocks">$0</div>
                <div id="stock-return-badge" class="inline-flex px-2 py-1 rounded text-xs font-bold w-fit">--</div>
            </div>
            <div class="glass-card rounded-2xl p-6 flex flex-col justify-center">
                <h3 class="text-zinc-400 text-xs font-medium uppercase tracking-wider mb-1" data-i18n="crypto_val">Crypto Value</h3>
                <div class="text-2xl font-bold text-white mb-2" id="val-crypto">$0</div>
                <div id="crypto-return-badge" class="inline-flex px-2 py-1 rounded text-xs font-bold w-fit">--</div>
            </div>
        </div>

        <!-- Chart Card -->
        <div class="glass-card rounded-2xl p-6 lg:col-span-1 flex flex-col justify-center items-center">
            <h3 class="text-zinc-400 text-xs font-medium uppercase tracking-wider mb-4 self-start" data-i18n="allocation">Allocation</h3>
            <div class="relative h-40 w-full"><canvas id="allocationChart"></canvas></div>
        </div>
    </div>

    <!-- ================= DETAILED HOLDINGS TABLE ================= -->
    <div class="glass-card rounded-2xl p-6 md:p-8 overflow-x-auto mb-12">
        <div class="flex justify-between items-center mb-6">
            <h3 class="text-xl font-bold text-white tracking-wide" data-i18n="realtime_holdings">My Portfolio</h3>
            <span id="forex-rate" class="text-xs text-zinc-400 font-medium bg-zinc-900/80 px-3 py-1.5 rounded-lg border border-zinc-800"></span>
        </div>
        <table class="w-full text-left border-collapse whitespace-nowrap">
            <thead>
                <tr class="text-zinc-500 text-xs uppercase tracking-widest border-b border-zinc-800/50">
                    <th class="pb-4 font-semibold pl-2" data-i18n="asset">Asset</th>
                    <th class="pb-4 font-semibold text-right" data-i18n="avg_cost">Avg Cost</th>
                    <th class="pb-4 font-semibold text-right" data-i18n="price">Live Price</th>
                    <th class="pb-4 font-semibold text-right" data-i18n="units">Units</th>
                    <th class="pb-4 font-semibold text-right" data-i18n="current_val">Market Value</th>
                    <th class="pb-4 font-semibold text-right pr-2" data-i18n="unrealized_pl">Unrealized P/L</th>
                </tr>
            </thead>
            <tbody id="holdings-table-body" class="text-sm">
                <!-- Data injected via JS -->
            </tbody>
        </table>
    </div>

    <!-- ================= MODAL FOR DATA ENTRY ================= -->
    <div id="update-modal" class="hidden fixed inset-0 bg-black/90 backdrop-blur-md z-50 flex justify-center items-center p-4">
        <div class="glass-card w-full max-w-2xl max-h-[90vh] rounded-2xl flex flex-col shadow-2xl border border-zinc-700/50">
            <div class="p-6 border-b border-zinc-800/50 flex justify-between items-center">
                <h3 class="text-xl font-bold text-white" data-i18n="modal_title">Manage Portfolio Assets</h3>
                <button onclick="closeModal()" class="text-zinc-500 hover:text-white bg-zinc-900 hover:bg-zinc-800 rounded-full p-2 transition"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg></button>
            </div>
            
            <div class="p-6 overflow-y-auto custom-scrollbar">
                <form id="daily-form">
                    <!-- Bank Input -->
                    <div class="mb-8 p-5 bg-zinc-900/50 rounded-xl border border-zinc-800/50">
                        <label class="block text-xs font-bold text-zinc-400 uppercase tracking-wider mb-3" data-i18n="bank_base">Cash Balance (USD)</label>
                        <input type="number" step="any" id="input-bank" required class="w-full bg-black border border-zinc-700 text-white p-3.5 rounded-lg focus:outline-none focus:border-emerald-500 transition text-lg font-medium shadow-inner" placeholder="0.00">
                    </div>

                    <!-- Stocks Input -->
                    <div class="mb-8">
                        <div class="flex justify-between items-center mb-4">
                            <label class="block text-xs font-bold text-zinc-400 uppercase tracking-wider" data-i18n="stock_units">Equities</label>
                            <button type="button" onclick="addAssetRow('stock')" class="text-xs font-bold bg-white text-black px-3 py-1.5 rounded-md hover:bg-zinc-200 transition">+ Add</button>
                        </div>
                        <div class="grid grid-cols-12 gap-2 mb-2 px-2 text-[10px] font-bold text-zinc-500 uppercase tracking-widest">
                            <div class="col-span-3">Ticker</div>
                            <div class="col-span-4">Units</div>
                            <div class="col-span-4">Avg Cost ($)</div>
                            <div class="col-span-1"></div>
                        </div>
                        <div id="stock-container" class="space-y-3"></div>
                    </div>

                    <!-- Crypto Input -->
                    <div class="mb-4">
                        <div class="flex justify-between items-center mb-4">
                            <label class="block text-xs font-bold text-zinc-400 uppercase tracking-wider" data-i18n="crypto_units">Crypto</label>
                            <button type="button" onclick="addAssetRow('crypto')" class="text-xs font-bold bg-white text-black px-3 py-1.5 rounded-md hover:bg-zinc-200 transition">+ Add</button>
                        </div>
                        <div id="crypto-container" class="space-y-3"></div>
                    </div>
                </form>
            </div>

            <div class="p-6 border-t border-zinc-800/50 flex gap-3 justify-end">
                <button onclick="closeModal()" class="px-6 py-3 rounded-xl text-sm font-bold text-zinc-400 hover:text-white hover:bg-zinc-800 transition" data-i18n="cancel">Cancel</button>
                <button type="submit" form="daily-form" class="px-8 py-3 bg-white hover:bg-zinc-200 text-black font-bold rounded-xl shadow-lg transition" data-i18n="save">Save Changes</button>
            </div>
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="fixed bottom-6 right-6 transform translate-y-[150%] opacity-0 transition-all duration-500 z-50 flex items-center gap-3 bg-zinc-900 border border-zinc-700 text-white px-5 py-4 rounded-xl shadow-2xl">
        <svg class="w-6 h-6 text-emerald-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
        <span id="toast-msg" class="font-bold text-sm">Updated!</span>
    </div>

    <script>
        // ================= API KEY =================
        const FINNHUB_API_KEY = 'd7ub5jpr01qnv95muqpgd7ub5jpr01qnv95muqq0'; 
        // ===========================================

        // --- State Variables ---
        let currentCurrency = 'USD';
        let currentLang = 'en';
        let jpyRate = 150.0;
        let cachedData = { totalNet: 0, bank: 0, stocksTotal: 0, cryptoTotal: 0, totalCost: 0, holdings: [] };
        let donutChartInstance = null;

        Chart.defaults.color = '#71717a'; 
        Chart.defaults.font.family = 'Montserrat';

        // NEW DATA STRUCTURE: Added 'avgCost'
        let portfolio = JSON.parse(localStorage.getItem('wealthPortfolioV7')) || {
            bank: 45000,
            stocks: [
                { ticker: 'MSFT', units: 120, avgCost: 350.00 }, 
                { ticker: 'LLY', units: 45, avgCost: 650.00 }, 
                { ticker: 'ABBV', units: 150, avgCost: 145.50 }, 
                { ticker: 'ASTS', units: 850, avgCost: 15.20 }
            ],
            crypto: [
                { ticker: 'BTC', units: 1.5, avgCost: 52000.00 }, 
                { ticker: 'ETH', units: 12, avgCost: 2800.00 }
            ]
        };

        const fallbackPrices = { 'MSFT': 415.50, 'LLY': 760.20, 'ABBV': 162.80, 'ASTS': 28.50, 'BTC': 64000, 'ETH': 3100 };

        // --- DICTIONARY (I18N) ---
        const dictionary = {
            en: {
                title: "Wealth Portfolio", update_btn: "Manage Assets",
                total_net: "Total Net Worth", total_return: "Total Return", 
                stocks_val: "Equities Value", crypto_val: "Crypto Value", allocation: "Allocation", realtime_holdings: "My Portfolio",
                fetching: "Connecting to market...", sync_done: "Live sync complete", mock_price: "Using mock prices",
                asset: "Asset", avg_cost: "Avg Cost", price: "Live Price", units: "Units", current_val: "Market Value", unrealized_pl: "Unrealized P/L",
                modal_title: "Manage Portfolio Assets", bank_base: "Cash Balance (USD)", 
                stock_units: "Equities", crypto_units: "Crypto", add_stock: "+ Add", add_crypto: "+ Add",
                cancel: "Cancel", save: "Save Changes", toast_success: "Portfolio successfully updated!"
            },
            jp: {
                title: "資産ポートフォリオ", update_btn: "資産管理",
                total_net: "純資産総額", total_return: "トータルリターン", 
                stocks_val: "株式評価額", crypto_val: "暗号資産評価額", allocation: "資産配分", realtime_holdings: "マイポートフォリオ",
                fetching: "市場データ取得中...", sync_done: "同期完了", mock_price: "モック価格使用中",
                asset: "資産", avg_cost: "平均取得単価", price: "現在価格", units: "保有数", current_val: "評価額", unrealized_pl: "未実現損益",
                modal_title: "保有資産の更新", bank_base: "現金残高 (USDベース)", 
                stock_units: "株式", crypto_units: "暗号資産", add_stock: "+ 追加", add_crypto: "+ 追加",
                cancel: "キャンセル", save: "保存", toast_success: "ポートフォリオが更新されました！"
            }
        };

        // --- UI TOGGLES ---
        function updateDateDisplay() {
            const dateEl = document.getElementById('current-date');
            dateEl.innerText = new Date().toLocaleDateString(currentLang === 'jp' ? 'ja-JP' : 'en-US', { year: 'numeric', month: 'short', day: 'numeric', weekday: 'short' }).toUpperCase();
        }

        function setLanguage(lang) {
            currentLang = lang;
            document.getElementById('btn-en').className = lang === 'en' ? "px-3 py-1.5 rounded-md text-xs font-bold bg-zinc-800 text-white transition shadow" : "px-3 py-1.5 rounded-md text-xs font-bold text-zinc-500 hover:text-zinc-300 transition";
            document.getElementById('btn-jp').className = lang === 'jp' ? "px-3 py-1.5 rounded-md text-xs font-bold bg-zinc-800 text-white transition shadow" : "px-3 py-1.5 rounded-md text-xs font-bold text-zinc-500 hover:text-zinc-300 transition";
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (dictionary[lang][key]) el.innerText = dictionary[lang][key];
            });
            updateDateDisplay();
            const statusMsg = document.getElementById('status-msg');
            if(statusMsg.innerText !== dictionary['en']['fetching'] && statusMsg.innerText !== dictionary['jp']['fetching']) {
                statusMsg.innerText = FINNHUB_API_KEY ? dictionary[lang]['sync_done'] : dictionary[lang]['mock_price'];
            }
        }

        function setCurrency(currency) {
            currentCurrency = currency;
            document.getElementById('btn-usd').className = currency === 'USD' ? "px-3 py-1.5 rounded-md text-xs font-bold bg-zinc-800 text-yellow-500 transition shadow" : "px-3 py-1.5 rounded-md text-xs font-bold text-zinc-500 hover:text-zinc-300 transition";
            document.getElementById('btn-jpy').className = currency === 'JPY' ? "px-3 py-1.5 rounded-md text-xs font-bold bg-zinc-800 text-yellow-500 transition shadow" : "px-3 py-1.5 rounded-md text-xs font-bold text-zinc-500 hover:text-zinc-300 transition";
            renderUI();
        }

        function formatMoney(usdValue, isPrice = false, showSign = false) {
            let val = currentCurrency === 'JPY' ? usdValue * jpyRate : usdValue;
            let prefix = currentCurrency === 'JPY' ? '¥' : '$';
            let sign = showSign ? (usdValue >= 0 ? '+' : '-') : (usdValue < 0 ? '-' : '');
            let absVal = Math.abs(val);
            let formatted = absVal.toLocaleString(currentCurrency === 'JPY' ? 'ja-JP' : 'en-US', { minimumFractionDigits: isPrice ? 2 : 2, maximumFractionDigits: 2 });
            return `${sign}${prefix}${formatted}`;
        }

        function getPlBadgeStyle(val) {
            if(val > 0) return { textClass: 'text-profit', bgClass: 'bg-profit', sign: '+' };
            if(val < 0) return { textClass: 'text-loss', bgClass: 'bg-loss', sign: '' };
            return { textClass: 'text-zinc-400', bgClass: 'bg-zinc-800', sign: '' };
        }

        // --- API & DATA PROCESSING ---
        async function fetchExchangeRate() {
            try {
                let res = await fetch('https://open.er-api.com/v6/latest/USD');
                let data = await res.json();
                jpyRate = data.rates.JPY;
                document.getElementById('forex-rate').innerText = `1 USD = ¥${jpyRate.toFixed(2)}`;
            } catch(e) { console.log("Exchange API error"); }
        }

        async function fetchPrice(type, ticker) {
            ticker = ticker.toUpperCase();
            if (type === 'crypto') {
                try {
                    let res = await fetch(`https://api.binance.com/api/v3/ticker/price?symbol=${ticker}USDT`);
                    let data = await res.json(); return parseFloat(data.price);
                } catch(e) { return fallbackPrices[ticker] || 0; }
            } else {
                if (!FINNHUB_API_KEY) return fallbackPrices[ticker] || 0;
                try {
                    let res = await fetch(`https://finnhub.io/api/v1/quote?symbol=${ticker}&token=${FINNHUB_API_KEY}`);
                    let data = await res.json(); return data.c > 0 ? data.c : (fallbackPrices[ticker] || 0);
                } catch(e) { return fallbackPrices[ticker] || 0; }
            }
        }

        async function processLiveDashboard() {
            document.getElementById('status-msg').innerText = dictionary[currentLang]['fetching'];
            document.getElementById('status-msg').className = "text-xs font-medium mt-6 text-yellow-500 animate-pulse";
            
            await fetchExchangeRate();
            
            let totalStocksValue = 0; let totalStocksCost = 0;
            let totalCryptoValue = 0; let totalCryptoCost = 0;
            const liveHoldings = [];

            for (let s of portfolio.stocks) {
                let price = await fetchPrice('stock', s.ticker);
                let val = s.units * price;
                let cost = s.units * (s.avgCost || 0);
                let pl = val - cost;
                let plPct = cost > 0 ? (pl / cost) * 100 : 0;
                
                totalStocksValue += val; totalStocksCost += cost;
                liveHoldings.push({ ticker: s.ticker, type: 'Stock', units: s.units, avgCostUsd: s.avgCost, priceUsd: price, valueUsd: val, plUsd: pl, plPct: plPct, iconColor: 'bg-yellow-500' });
            }

            for (let c of portfolio.crypto) {
                let price = await fetchPrice('crypto', c.ticker);
                let val = c.units * price;
                let cost = c.units * (c.avgCost || 0);
                let pl = val - cost;
                let plPct = cost > 0 ? (pl / cost) * 100 : 0;

                totalCryptoValue += val; totalCryptoCost += cost;
                liveHoldings.push({ ticker: c.ticker, type: 'Crypto', units: c.units, avgCostUsd: c.avgCost, priceUsd: price, valueUsd: val, plUsd: pl, plPct: plPct, iconColor: 'bg-orange-500' });
            }

            cachedData = {
                totalNet: portfolio.bank + totalStocksValue + totalCryptoValue,
                totalCost: portfolio.bank + totalStocksCost + totalCryptoCost,
                bank: portfolio.bank,
                stocksTotal: totalStocksValue, stocksCost: totalStocksCost,
                cryptoTotal: totalCryptoValue, cryptoCost: totalCryptoCost,
                holdings: liveHoldings
            };

            document.getElementById('status-msg').innerText = FINNHUB_API_KEY ? dictionary[currentLang]['sync_done'] : dictionary[currentLang]['mock_price'];
            document.getElementById('status-msg').className = "text-xs font-medium mt-6 text-zinc-500";

            renderUI();
        }

        // --- RENDER UI ---
        function renderUI() {
            // Total Net Worth
            document.getElementById('val-total').innerText = formatMoney(cachedData.totalNet);
            
            // Total P/L Calculation
            let totalPl = cachedData.totalNet - cachedData.totalCost;
            let totalPlPct = cachedData.totalCost > 0 ? (totalPl / cachedData.totalCost) * 100 : 0;
            let plStyle = getPlBadgeStyle(totalPl);
            
            const returnBadge = document.getElementById('total-return-badge');
            returnBadge.className = `px-3 py-1.5 rounded-lg text-sm font-bold flex items-center gap-1.5 ${plStyle.bgClass} ${plStyle.textClass}`;
            document.getElementById('val-return-amt').innerText = formatMoney(totalPl, false, true);
            document.getElementById('val-return-pct').innerText = `${plStyle.sign}${totalPlPct.toFixed(2)}%`;

            // Sub-Cards
            document.getElementById('val-bank').innerText = formatMoney(cachedData.bank);
            document.getElementById('val-stocks').innerText = formatMoney(cachedData.stocksTotal);
            document.getElementById('val-crypto').innerText = formatMoney(cachedData.cryptoTotal);

            // Sub-Cards P/L Badges
            let stockPl = cachedData.stocksTotal - cachedData.stocksCost;
            let stockPlPct = cachedData.stocksCost > 0 ? (stockPl / cachedData.stocksCost) * 100 : 0;
            let stStyle = getPlBadgeStyle(stockPlPct);
            let stBadge = document.getElementById('stock-return-badge');
            stBadge.className = `inline-flex px-2 py-1 rounded text-xs font-bold w-fit mt-1 ${stStyle.bgClass} ${stStyle.textClass}`;
            stBadge.innerText = `${stStyle.sign}${stockPlPct.toFixed(2)}%`;

            let cryptoPl = cachedData.cryptoTotal - cachedData.cryptoCost;
            let cryptoPlPct = cachedData.cryptoCost > 0 ? (cryptoPl / cachedData.cryptoCost) * 100 : 0;
            let crStyle = getPlBadgeStyle(cryptoPlPct);
            let crBadge = document.getElementById('crypto-return-badge');
            crBadge.className = `inline-flex px-2 py-1 rounded text-xs font-bold w-fit mt-1 ${crStyle.bgClass} ${crStyle.textClass}`;
            crBadge.innerText = `${crStyle.sign}${cryptoPlPct.toFixed(2)}%`;

            // Holdings Table
            const tbody = document.getElementById('holdings-table-body');
            tbody.innerHTML = '';
            cachedData.holdings.sort((a, b) => b.valueUsd - a.valueUsd).forEach(asset => {
                let assetPlStyle = getPlBadgeStyle(asset.plPct);
                tbody.innerHTML += `
                <tr class="border-b border-zinc-800/50 hover:bg-zinc-900/50 transition">
                    <td class="py-4 pl-2">
                        <div class="flex items-center gap-3">
                            <div class="w-8 h-8 rounded-full ${asset.iconColor} flex items-center justify-center text-black font-bold text-xs">${asset.ticker.substring(0,2)}</div>
                            <div>
                                <div class="font-bold text-white text-base">${asset.ticker}</div>
                                <div class="text-[10px] text-zinc-500 uppercase tracking-widest">${asset.type}</div>
                            </div>
                        </div>
                    </td>
                    <td class="py-4 text-right text-zinc-400 font-medium">${formatMoney(asset.avgCostUsd, true)}</td>
                    <td class="py-4 text-right text-white font-medium">${formatMoney(asset.priceUsd, true)}</td>
                    <td class="py-4 text-right text-zinc-300 font-medium">${asset.units.toLocaleString(undefined, {minimumFractionDigits:0, maximumFractionDigits:4})}</td>
                    <td class="py-4 text-right font-bold text-white">${formatMoney(asset.valueUsd)}</td>
                    <td class="py-4 text-right pr-2">
                        <div class="flex flex-col items-end">
                            <span class="font-bold ${assetPlStyle.textClass}">${formatMoney(asset.plUsd, false, true)}</span>
                            <span class="text-xs font-semibold px-1.5 py-0.5 rounded mt-1 ${assetPlStyle.bgClass} ${assetPlStyle.textClass}">${assetPlStyle.sign}${asset.plPct.toFixed(2)}%</span>
                        </div>
                    </td>
                </tr>`;
            });

            // Chart Update (Minimalist Donut)
            const ctx = document.getElementById('allocationChart').getContext('2d');
            if (donutChartInstance) donutChartInstance.destroy();
            donutChartInstance = new Chart(ctx, {
                type: 'doughnut',
                data: { labels: ['Cash', 'Equities', 'Crypto'], datasets: [{ data: [cachedData.bank, cachedData.stocksTotal, cachedData.cryptoTotal], backgroundColor: ['#ffffff', '#eab308', '#f97316'], borderWidth: 0, hoverOffset: 4 }] },
                options: { responsive: true, maintainAspectRatio: false, cutout: '80%', plugins: { legend: { display: false } }, animation: { duration: 800, easing: 'easeOutQuart' } }
            });
        }

        function refreshLivePrices() { processLiveDashboard(); }

        // --- MODAL & FORM LOGIC ---
        const modal = document.getElementById('update-modal');
        function openModal() {
            document.getElementById('input-bank').value = portfolio.bank;
            
            document.getElementById('stock-container').innerHTML = '';
            portfolio.stocks.forEach(s => addAssetRow('stock', s.ticker, s.units, s.avgCost));
            if(portfolio.stocks.length === 0) addAssetRow('stock');
            
            document.getElementById('crypto-container').innerHTML = '';
            portfolio.crypto.forEach(c => addAssetRow('crypto', c.ticker, c.units, c.avgCost));
            if(portfolio.crypto.length === 0) addAssetRow('crypto');
            
            modal.classList.remove('hidden'); 
            modal.querySelector('.glass-card').classList.remove('modal-exit');
            modal.querySelector('.glass-card').classList.add('modal-enter');
        }

        function closeModal() { 
            const card = modal.querySelector('.glass-card');
            card.classList.remove('modal-enter');
            card.classList.add('modal-exit');
            setTimeout(() => { modal.classList.add('hidden'); }, 300);
        }
        
        function showToast(msg) {
            document.getElementById('toast-msg').innerText = msg;
            const t = document.getElementById('toast');
            t.classList.remove('translate-y-[150%]', 'opacity-0');
            setTimeout(() => t.classList.add('translate-y-[150%]', 'opacity-0'), 3000);
        }

        // Updated row to include Avg Cost input
        function addAssetRow(type, ticker = '', units = '', avgCost = '') {
            const container = document.getElementById(`${type}-container`);
            const row = document.createElement('div');
            row.className = `grid grid-cols-12 gap-2 items-center ${type}-row`;
            row.innerHTML = `
                <div class="col-span-3"><input type="text" placeholder="Ticker" value="${ticker}" required class="asset-ticker w-full bg-black border border-zinc-800 text-white p-2.5 rounded-lg text-sm uppercase focus:outline-none focus:border-emerald-500 text-center"></div>
                <div class="col-span-4"><input type="number" step="any" placeholder="Units" value="${units}" required class="asset-units w-full bg-black border border-zinc-800 text-white p-2.5 rounded-lg text-sm focus:outline-none focus:border-emerald-500"></div>
                <div class="col-span-4"><input type="number" step="any" placeholder="Cost" value="${avgCost}" required class="asset-avgcost w-full bg-black border border-zinc-800 text-white p-2.5 rounded-lg text-sm focus:outline-none focus:border-emerald-500"></div>
                <div class="col-span-1 text-center"><button type="button" onclick="this.parentElement.parentElement.remove()" class="text-zinc-600 hover:text-rose-500 transition"><svg class="w-5 h-5 inline" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg></button></div>
            `;
            container.appendChild(row);
        }

        document.getElementById('daily-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const bank = parseFloat(document.getElementById('input-bank').value) || 0;
            const stocks = []; 
            document.querySelectorAll('.stock-row').forEach(row => { 
                const t = row.querySelector('.asset-ticker').value.toUpperCase(); 
                const u = parseFloat(row.querySelector('.asset-units').value) || 0; 
                const c = parseFloat(row.querySelector('.asset-avgcost').value) || 0;
                if(t) stocks.push({ticker: t, units: u, avgCost: c}); 
            });
            const crypto = []; 
            document.querySelectorAll('.crypto-row').forEach(row => { 
                const t = row.querySelector('.asset-ticker').value.toUpperCase(); 
                const u = parseFloat(row.querySelector('.asset-units').value) || 0; 
                const c = parseFloat(row.querySelector('.asset-avgcost').value) || 0;
                if(t) crypto.push({ticker: t, units: u, avgCost: c}); 
            });
            
            portfolio = { bank, stocks, crypto };
            localStorage.setItem('wealthPortfolioV7', JSON.stringify(portfolio));
            closeModal(); 
            showToast(dictionary[currentLang]['toast_success']); 
            processLiveDashboard();
        });

        // --- BOOTSTRAP ---
        updateDateDisplay();
        setLanguage('en');
        processLiveDashboard();
    </script>
</body>
</html>
